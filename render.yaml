services:
  - type: web
    name: medassist
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python seed.py
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URI
        value: sqlite:///medassist.db
      - key: FLASK_DEBUG
        value: 0
      - key: PYTHON_VERSION
        value: 3.9.0