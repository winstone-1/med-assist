{% extends 'base.html' %}
{% block title %}Login — MedAssist{% endblock %}
{% block content %}

<div class="auth-card card shadow">
  <div class="card-header text-center text-white">
    <h4 class="mb-0 fw-bold">
      <i class="bi bi-box-arrow-in-right me-2"></i>Welcome Back
    </h4>
    <p class="mb-0 small opacity-75 mt-1">Sign in to your MedAssist account</p>
  </div>
  <div class="card-body p-4">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold small">Email Address</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0">
            <i class="bi bi-envelope text-muted"></i>
          </span>
          <input type="email" name="email" class="form-control border-start-0"
                 placeholder="you@example.com" required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold small">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0">
            <i class="bi bi-lock text-muted"></i>
          </span>
          <input type="password" name="password" class="form-control border-start-0"
                 placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" class="btn btn-teal w-100 py-2 fw-semibold">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>
    <hr class="my-3">
    <p class="text-center text-muted small mb-0">
      Don't have an account?
      <a href="{{ url_for('register') }}" class="text-teal fw-semibold">Sign up free</a>
    </p>
  </div>
</div>

{% endblock %}
