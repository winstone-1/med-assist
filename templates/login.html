{% extends 'base.html' %}
{% block title %}Login — MedAssist{% endblock %}
{% block content %}

<div class="auth-card card shadow">
  <div class="card-header text-center text-white">
    <h4 class="mb-0 fw-bold">
      <i class="fa-solid fa-right-to-bracket me-2"></i>Welcome Back
    </h4>
    <p class="mb-0 small opacity-75 mt-1">Sign in to your MedAssist account</p>
  </div>
  <div class="card-body p-4">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold small">Email Address</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0">
            <i class="fa-solid fa-envelope text-muted"></i>
          </span>
          <input type="email" name="email" class="form-control border-start-0"
                 placeholder="you@example.com" required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold small">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0">
            <i class="fa-solid fa-lock text-muted"></i>
          </span>
          <input type="password" name="password" class="form-control border-start-0"
                 placeholder="••••••••" required>
        </div>
      </div>
      <div class="mb-3 d-flex justify-content-between align-items-center">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="rememberMe">
          <label class="form-check-label small" for="rememberMe">
            Remember me
          </label>
        </div>
        <a href="#" class="small text-teal text-decoration-none">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-teal w-100 py-2 fw-semibold">
        <i class="fa-solid fa-right-to-bracket me-2"></i>Sign In
      </button>
    </form>

    <div class="position-relative my-4">
      <hr>
      <span class="position-absolute top-50 start-50 translate-middle bg-white px-3 text-muted small">OR</span>
    </div>

    <button onclick="signInWithGoogle()" class="btn btn-outline-danger w-100 py-2">
      <i class="fa-brands fa-google me-2"></i>Continue with Google
    </button>

    <hr class="my-3">
    <p class="text-center text-muted small mb-0">
      Don't have an account?
      <a href="{{ url_for('register') }}" class="text-teal fw-semibold text-decoration-none">Sign up free</a>
    </p>
  </div>
</div>

<!-- Firebase Google Sign-In Script -->
<script type="module">
  // Import Firebase (if using module approach)
  // Or use the global approach from base.html
  
  window.signInWithGoogle = function() {
    // Check if Firebase is loaded
    if (typeof firebase === 'undefined') {
      console.error('Firebase not loaded');
      alert('Google Sign-In is not available at the moment. Please use email login.');
      return;
    }
    
    const provider = new firebase.auth.GoogleAuthProvider();
    firebase.auth().signInWithPopup(provider)
      .then((result) => {
        // Send to backend to create/login user
        fetch('/google-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: result.user.email,
            name: result.user.displayName,
            google_id: result.user.uid,
            photo_url: result.user.photoURL
          })
        })
        .then(response => response.json())
        .then(data => {
          if (data.success) {
            window.location.href = '/';
          } else {
            alert('Login failed. Please try again.');
          }
        });
      })
      .catch((error) => {
        console.error('Google Sign-In Error:', error);
        alert('Google Sign-In failed: ' + error.message);
      });
  };
</script>

{% endblock %}
