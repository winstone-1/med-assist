{% extends 'base.html' %}
{% block title %}Register — MedAssist{% endblock %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-lg border-0" style="border-radius: 24px; overflow: hidden;">
      
      <div class="text-center py-4" style="background: linear-gradient(135deg, #1A7A7A, #0D5F5F);">
        <div class="mb-3">
          <i class="fa-solid fa-user-plus fa-4x text-white opacity-75"></i>
        </div>
        <h4 class="fw-bold text-white mb-0">Create Account</h4>
        <p class="text-white-50 small mt-1">Join MedAssist today</p>
      </div>
      
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold small text-muted">Username</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0">
                <i class="fa-solid fa-user text-teal"></i>
              </span>
              <input type="text" name="username" class="form-control border-start-0" 
                     placeholder="johndoe" required>
            </div>
          </div>
          
          <div class="mb-3">
            <label class="form-label fw-semibold small text-muted">Email Address</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0">
                <i class="fa-solid fa-envelope text-teal"></i>
              </span>
              <input type="email" name="email" class="form-control border-start-0" 
                     placeholder="you@example.com" required>
            </div>
          </div>
          
          <div class="mb-3">
            <label class="form-label fw-semibold small text-muted">Password</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0">
                <i class="fa-solid fa-lock text-teal"></i>
              </span>
              <input type="password" name="password" class="form-control border-start-0" 
                     placeholder="••••••••" required>
            </div>
          </div>
          
          <div class="mb-4">
            <label class="form-label fw-semibold small text-muted">Confirm Password</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0">
                <i class="fa-solid fa-lock text-teal"></i>
              </span>
              <input type="password" name="confirm_password" class="form-control border-start-0" 
                     placeholder="••••••••" required>
            </div>
          </div>
          
          <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="termsCheck" required>
            <label class="form-check-label small" for="termsCheck">
              I agree to the <a href="#" class="text-teal">Terms of Service</a> and 
              <a href="#" class="text-teal">Privacy Policy</a>
            </label>
          </div>
          
          <button type="submit" class="btn btn-teal w-100 py-2 fw-semibold">
            <i class="fa-solid fa-user-plus me-2"></i>Sign Up
          </button>
        </form>

        <div class="position-relative my-4">
          <hr>
          <span class="position-absolute top-50 start-50 translate-middle bg-white px-3 text-muted small">OR</span>
        </div>

        <button onclick="signInWithGoogle()" class="btn btn-outline-secondary w-100 py-2 mb-3" style="border-radius: 30px;">
          <i class="fa-brands fa-google text-danger me-2"></i>Sign up with Google
        </button>

        <p class="text-center text-muted small mb-0">
          Already have an account?
          <a href="{{ url_for('login') }}" class="text-teal fw-semibold text-decoration-none">Sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>

<script>
  window.signInWithGoogle = function() {
    if (typeof firebase === 'undefined' || firebaseConfig.apiKey === "YOUR_API_KEY") {
      alert('Google Sign-In demo: Use email registration instead.');
      return;
    }
    
    const provider = new firebase.auth.GoogleAuthProvider();
    firebase.auth().signInWithPopup(provider)
      .then((result) => {
        fetch('/google-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: result.user.email,
            name: result.user.displayName,
            google_id: result.user.uid
          })
        })
        .then(response => response.json())
        .then(data => {
          if (data.success) {
            window.location.href = '/';
          }
        });
      })
      .catch((error) => {
        alert('Google Sign-In failed: ' + error.message);
      });
  };
</script>

{% endblock %}
